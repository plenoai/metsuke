{% extends "base.html" %}

{% block title %}{{ owner }}/{{ repo }}{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js" integrity="sha256-jrQbZYgx+rF1+tm80A/LLYTg7TolpVBT1OzUREuLQ6A=" crossorigin="anonymous"></script>
{% endblock %}

{% block content %}
  <div class="breadcrumb">
    <a href="/repos">リポジトリ</a> / {{ owner }}/{{ repo }}
  </div>
  <div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem">
      <div>
        <div style="font-size:1.3rem;font-weight:800;letter-spacing:0.02em">{{ owner }}<span style="color:var(--text-secondary);font-weight:400"> / </span>{{ repo }}</div>
        <a class="gh-link" href="https://github.com/{{ owner }}/{{ repo }}" target="_blank" rel="noopener" style="font-family:var(--font-mono);font-size:0.75rem;margin-left:0">
          <svg viewBox="0 0 16 16"><path d="M3.75 2h3.5a.75.75 0 010 1.5H4.56l6.22 6.22a.75.75 0 11-1.06 1.06L3.5 4.56v2.69a.75.75 0 01-1.5 0v-3.5A1.75 1.75 0 013.75 2z"/><path d="M9.25 3.5a.75.75 0 010-1.5h3A1.75 1.75 0 0114 3.75v8.5A1.75 1.75 0 0112.25 14h-8.5A1.75 1.75 0 012 12.25v-3a.75.75 0 011.5 0v3c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25v-8.5a.25.25 0 00-.25-.25h-3z"/></svg>
          GitHub で開く
        </a>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
        <a class="verify-btn" href="/repos/{{ owner }}/{{ repo }}/releases" style="text-decoration:none">リリース検証</a>
        <a class="verify-btn" href="/repos/{{ owner }}/{{ repo }}/pulls" style="text-decoration:none">PR検証</a>
        <select class="policy-select" id="policy-select">
          {% for p in policy_options %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
        </select>
        <button class="verify-btn" id="verify-btn" onclick="runVerify()">リポジトリ検証</button>
      </div>
    </div>
  </div>

  <div id="result-area" aria-live="polite"></div>

  <div id="readme-area" class="section" style="margin-top:1.5rem">
    <div id="readme-loading" class="loading" role="status">README を読み込み中</div>
  </div>
{% endblock %}

{% block scripts %}
<script>
const OWNER = '{{ owner }}';
const REPO = '{{ repo }}';

async function runVerify() {
  const btn = document.getElementById('verify-btn');
  const area = document.getElementById('result-area');
  const policyEl = document.getElementById('policy-select');
  const policy = policyEl.value;

  btn.disabled = true;
  btn.textContent = '検証中…';
  btn.classList.add('running');
  area.innerHTML = '<div class="loading" role="status">検証を実行中</div>';

  try {
    const resp = await fetchWithTimeout(`/api/repos/${OWNER}/${REPO}/verify?policy=${encodeURIComponent(policy)}`, { method: 'POST' }, 60000);
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    const profileName = data.profile_name || policy;
    area.innerHTML = renderFindingsTable(data.findings, `検証結果 — ${esc(profileName)}`);
  } catch (e) {
    area.innerHTML = renderErrorCard(e.message);
  }

  btn.disabled = false;
  btn.textContent = '再検証';
  btn.classList.remove('running');
}

enhancePolicySelect(document.getElementById('policy-select'));

(async function loadReadme() {
  const area = document.getElementById('readme-area');
  const loading = document.getElementById('readme-loading');
  try {
    const resp = await fetch(`/api/repos/${OWNER}/${REPO}/readme`);
    if (resp.status === 404) {
      area.style.display = 'none';
      return;
    }
    if (!resp.ok) throw new Error(await resp.text());
    const rawHtml = await resp.text();
    loading.remove();

    // README file header (GitHub-style)
    const header = document.createElement('div');
    header.className = 'readme-header';
    header.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.743 3.743 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.06 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75Zm7.251 10.324.004-5.073-.002-2.253A2.25 2.25 0 0 0 5.003 2.5H1.5v9h3.757a3.75 3.75 0 0 1 1.994.574ZM8.755 4.75l-.004 7.322a3.752 3.752 0 0 1 1.992-.572H14.5v-9h-3.495a2.25 2.25 0 0 0-2.25 2.25Z"></path></svg> README.md';
    area.appendChild(header);

    // Sanitize HTML with DOMPurify
    const clean = typeof DOMPurify !== 'undefined'
      ? DOMPurify.sanitize(rawHtml, {
          USE_PROFILES: { html: true },
          ADD_TAGS: ['summary', 'details', 'picture', 'source', 'math', 'mrow', 'mi', 'mo', 'mn', 'msup', 'msub', 'mfrac', 'mover', 'munder', 'mspace', 'mtable', 'mtr', 'mtd', 'annotation', 'semantics'],
          ADD_ATTR: ['align', 'media', 'srcset', 'sizes', 'loading', 'decoding', 'crossorigin', 'mathvariant', 'encoding', 'xmlns'],
          ALLOW_ARIA_ATTR: true,
          ALLOW_DATA_ATTR: true,
        })
      : rawHtml;

    const content = document.createElement('div');
    content.className = 'markdown-body card';
    content.innerHTML = clean;

    // Rewrite relative URLs to absolute GitHub URLs
    const ghRaw = `https://raw.githubusercontent.com/${OWNER}/${REPO}/HEAD/`;
    const ghBlob = `https://github.com/${OWNER}/${REPO}/blob/HEAD/`;

    // Fix images: relative src → raw.githubusercontent.com
    content.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src');
      if (src && !src.startsWith('http') && !src.startsWith('data:') && !src.startsWith('//')) {
        img.src = ghRaw + src.replace(/^\.?\//, '');
      }
      // Lazy loading for performance
      img.loading = 'lazy';
      img.decoding = 'async';
    });

    // Fix <source> in <picture>
    content.querySelectorAll('picture source').forEach(source => {
      const srcset = source.getAttribute('srcset');
      if (srcset && !srcset.startsWith('http') && !srcset.startsWith('data:')) {
        source.srcset = ghRaw + srcset.replace(/^\.?\//, '');
      }
    });

    // Fix links: relative href → GitHub blob
    content.querySelectorAll('a').forEach(a => {
      const href = a.getAttribute('href');
      if (!href) return;
      // Anchor links — keep as-is
      if (href.startsWith('#')) return;
      // Absolute URLs — open in new tab
      if (href.startsWith('http') || href.startsWith('//')) {
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        return;
      }
      // Relative links → GitHub blob view
      a.href = ghBlob + href.replace(/^\.?\//, '');
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    });

    area.appendChild(content);
  } catch (e) {
    loading.remove();
    area.style.display = 'none';
  }
})();
</script>
{% endblock %}
