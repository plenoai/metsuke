{% extends "base.html" %}

{% block title %}PR検証 — {{ owner }}/{{ repo }}{% endblock %}

{% block head %}
<style>
.pr-list {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}
.pr-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 0.75rem;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: border-color 0.2s ease;
  gap: 0.75rem;
  cursor: pointer;
}
.pr-item:hover {
  border-color: var(--text-secondary-border);
}
.pr-item.selected {
  border-color: var(--accent-purple-border);
  background: var(--bg-surface);
}
.pr-detail {
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 8px 8px;
  background: var(--bg-surface);
  margin-top: -0.4rem;
  margin-bottom: 0.4rem;
}
.pr-detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.pr-item.selected {
  border-radius: 8px 8px 0 0;
}
.pr-item-info {
  flex: 1;
  min-width: 0;
}
.pr-item-title {
  font-size: 0.85rem;
  font-weight: 700;
  margin-bottom: 0.15rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.pr-item-meta {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-secondary);
  display: flex;
  gap: 0.6rem;
}
.pr-state {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
  font-weight: 600;
}
.pr-open {
  background: var(--accent-green-dim);
  color: var(--accent-green);
  border: 1px solid var(--accent-green-border);
}
.pr-closed {
  background: var(--accent-vermillion-glow);
  color: var(--accent-vermillion);
  border: 1px solid var(--accent-vermillion-glow);
}
.pr-merged {
  background: var(--accent-purple-dim);
  color: var(--accent-purple);
  border: 1px solid var(--accent-purple-border);
}
.pr-draft {
  background: var(--text-secondary-dim);
  color: var(--text-secondary);
  border: 1px solid var(--text-secondary-border);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
}
@media (max-width: 600px) {
  .findings-table { font-size: 0.65rem; }
  .findings-table th, .findings-table td { padding: 0.4rem; }
  .pr-item { flex-direction: column; align-items: flex-start; }
}
</style>
{% endblock %}

{% block content %}
  <div class="breadcrumb">
    <a href="/repos">リポジトリ</a> / <a href="/repos/{{ owner }}/{{ repo }}">{{ owner }}/{{ repo }}</a> / PR検証
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">
    <div class="section-title" style="margin-bottom:0">Pull Request</div>
    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
      <select class="policy-select" id="pr-filter" onchange="applyFilter()" aria-label="状態フィルタ">
        <option value="">all</option>
        <option value="open">open</option>
        <option value="merged" selected>merged</option>
        <option value="closed">closed</option>
      </select>
      <select class="policy-select" id="pr-policy" aria-label="ポリシー">
        {% for p in policy_options %}
        <option value="{{ p }}">{{ p }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div id="pr-list" aria-live="polite"><div class="loading" role="status">PRを取得中</div></div>
{% endblock %}

{% block scripts %}
<script>
const OWNER = '{{ owner }}';
const REPO = '{{ repo }}';
let allPRs = [];
let selectedPR = null;

function prState(pr) {
  if (pr.merged_at) return 'merged';
  if (pr.state === 'closed') return 'closed';
  return 'open';
}

function prStateBadge(pr) {
  const s = prState(pr);
  if (s === 'merged') return '<span class="pr-state pr-merged">merged</span>';
  if (s === 'closed') return '<span class="pr-state pr-closed">closed</span>';
  return '<span class="pr-state pr-open">open</span>';
}

function togglePR(num) {
  if (selectedPR === num) {
    selectedPR = null;
  } else {
    selectedPR = num;
  }
  renderCurrentList();
}

function renderPRList(prs) {
  const container = document.getElementById('pr-list');
  if (prs.length === 0) {
    container.innerHTML = '<div style="font-family:var(--font-mono);font-size:0.8rem;color:var(--text-secondary);padding:1rem 0">PRはありません</div>';
    return;
  }
  container.innerHTML = '<div class="pr-list">' + prs.map(pr => {
    const isSelected = selectedPR === pr.pr_number;
    return `
    <div class="pr-item${isSelected ? ' selected' : ''}" onclick="togglePR(${pr.pr_number})">
      <div class="pr-item-info">
        <div class="pr-item-title">#${pr.pr_number} ${esc(pr.title)}</div>
        <div class="pr-item-meta">
          ${prStateBadge(pr)}
          <span>${esc(pr.author)}</span>
          <span>${new Date(pr.updated_at).toLocaleDateString('ja-JP')}</span>
          ${pr.draft ? '<span class="pr-draft">draft</span>' : ''}
        </div>
      </div>
      <div style="display:flex;gap:0.4rem;align-items:center">
        <div id="pr-result-${pr.pr_number}" class="result-summary" style="display:flex;gap:0.25rem"></div>
      </div>
    </div>
    ${isSelected ? `<div class="pr-detail" id="pr-detail-${pr.pr_number}">
      <div class="pr-detail-header">
        <a href="https://github.com/${OWNER}/${REPO}/pull/${pr.pr_number}" target="_blank" rel="noopener" style="font-family:var(--font-mono);font-size:0.72rem;color:var(--text-secondary)">GitHub で開く ↗</a>
        <button class="verify-btn" id="pr-verify-btn-${pr.pr_number}" onclick="event.stopPropagation();verifyPRById(${pr.pr_number})">検証</button>
      </div>
      <div id="pr-findings-${pr.pr_number}"></div>
    </div>` : ''}`;
  }).join('') + '</div>';
}

let _currentFiltered = [];
function renderCurrentList() {
  renderPRList(_currentFiltered);
  applyAuditBadges();
}

function applyFilter() {
  const filter = document.getElementById('pr-filter').value;
  let filtered = allPRs;
  if (filter) filtered = allPRs.filter(pr => prState(pr) === filter);
  filtered.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
  _currentFiltered = filtered;
  renderPRList(filtered);
}

// 過去の検証結果をPRバッジに反映
let _auditCache = {};
async function loadAuditResults() {
  try {
    const entries = await swrFetch(`/api/audit/history?type=pr&owner=${OWNER}&repo=${REPO}&limit=100`);
    _auditCache = {};
    for (const e of entries) {
      const num = e.target_ref.replace('#', '');
      if (!_auditCache[num]) _auditCache[num] = e;
    }
  } catch (_) {}
}

function applyAuditBadges() {
  for (const [num, e] of Object.entries(_auditCache)) {
    const el = document.getElementById(`pr-result-${num}`);
    if (el && !el.innerHTML) {
      el.innerHTML = compactBadges(e.pass, e.fail, e.review);
    }
  }
}

async function loadPRs() {
  try {
    allPRs = await swrFetch(`/api/repos/${OWNER}/${REPO}/pulls`);
    applyFilter();
    await loadAuditResults();
    applyAuditBadges();
    autoVerifyIfFew();
  } catch (e) {
    renderLoadError('pr-list', 'PRの取得に失敗しました。', 'loadPRs');
  }
}

// 検証結果が無いPRが表示中10件未満なら自動検証
async function autoVerifyIfFew() {
  const unverified = _currentFiltered.filter(pr => !_auditCache[pr.pr_number]);
  if (unverified.length === 0 || _currentFiltered.length >= 10) return;
  const policy = document.getElementById('pr-policy').value;
  for (const pr of unverified) {
    try {
      const resp = await fetch(`/api/repos/${OWNER}/${REPO}/verify-pr/${pr.pr_number}?policy=${encodeURIComponent(policy)}`, { method: 'POST' });
      if (!resp.ok) continue;
      const data = await resp.json();
      const c = countFindings(data.findings);
      _auditCache[pr.pr_number] = { pass: c.pass, fail: c.fail, review: c.review };
      const el = document.getElementById(`pr-result-${pr.pr_number}`);
      if (el) el.innerHTML = compactBadges(c.pass, c.fail, c.review);
    } catch (_) {}
  }
}

async function verifyPRById(num) {
  const policy = document.getElementById('pr-policy').value;
  const btn = document.getElementById(`pr-verify-btn-${num}`);
  const findingsEl = document.getElementById(`pr-findings-${num}`);
  const resultEl = document.getElementById(`pr-result-${num}`);
  if (!btn || !findingsEl) return;

  btn.disabled = true;
  btn.textContent = '検証中…';
  btn.classList.add('running');
  findingsEl.innerHTML = '<div class="loading" role="status">検証を実行中</div>';

  try {
    const resp = await fetch(`/api/repos/${OWNER}/${REPO}/verify-pr/${num}?policy=${encodeURIComponent(policy)}`, { method: 'POST' });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    const c = countFindings(data.findings);
    if (resultEl) resultEl.innerHTML = compactBadges(c.pass, c.fail, c.review);
    findingsEl.innerHTML = renderFindingsTable(data.findings, `PR #${num} 検証結果`);
    btn.textContent = '再検証';
  } catch (e) {
    if (resultEl) resultEl.innerHTML = '<span class="badge badge-fail" title="ERROR">ERR</span>';
    findingsEl.innerHTML = renderErrorCard(e.message);
    btn.textContent = '再試行';
  }
  btn.disabled = false;
  btn.classList.remove('running');
}

loadPRs();

// SSE: バックグラウンド同期完了時にPR一覧を再取得
const es = new EventSource('/api/events');
es.addEventListener('job', async (e) => {
  try {
    const ev = JSON.parse(e.data);
    if (ev.type === 'pulls_synced' && ev.owner === OWNER && ev.repo === REPO) {
      delete _swrCache[`/api/repos/${OWNER}/${REPO}/pulls`];
      loadPRs();
    }
  } catch (_) {}
});
</script>
{% endblock %}
