{% extends "base.html" %}

{% block title %}PR検証 — {{ owner }}/{{ repo }}{% endblock %}

{% block head %}
<style>
.pr-form {
  display: flex;
  gap: 0.75rem;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.form-group label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-secondary);
  letter-spacing: 0.05em;
}
.form-group input {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  padding: 0.5rem 0.75rem;
  background: var(--bg-deep);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 5px;
  width: 120px;
  transition: border-color 0.2s ease;
}
.form-group input:focus {
  outline: none;
  border-color: var(--accent-gold);
}
.breadcrumb {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-bottom: 0.5rem;
}
.breadcrumb a {
  color: var(--text-secondary);
  text-decoration: none;
  transition: color 0.2s ease;
}
.breadcrumb a:hover {
  color: var(--accent-gold);
}
.findings-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 0.75rem;
}
.findings-table th {
  text-align: left;
  padding: 0.6rem 0.75rem;
  color: var(--text-secondary);
  font-weight: 500;
  letter-spacing: 0.1em;
  font-size: 0.65rem;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.findings-table td {
  padding: 0.6rem 0.75rem;
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: top;
}
.findings-table tr:last-child td {
  border-bottom: none;
}
.rationale-cell {
  color: var(--text-secondary);
  font-size: 0.7rem;
  line-height: 1.5;
  max-width: 400px;
}
.summary-bar {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 1rem;
  padding: 0.75rem 1rem;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--font-mono);
  font-size: 0.8rem;
}
.summary-item {
  display: flex;
  align-items: center;
  gap: 0.3rem;
}
@media (max-width: 600px) {
  .pr-form { flex-direction: column; align-items: stretch; }
  .form-group input { width: 100%; }
  .findings-table { font-size: 0.65rem; }
  .findings-table th, .findings-table td { padding: 0.4rem; }
}
</style>
{% endblock %}

{% block content %}
  <div class="breadcrumb">
    <a href="/repos">Repos</a> / <a href="/repos/{{ owner }}/{{ repo }}">{{ owner }}/{{ repo }}</a> / PR検証
  </div>

  <div class="section-title">Pull Request 検証</div>

  <div class="card">
    <div class="pr-form">
      <div class="form-group">
        <label for="pr-number">PR番号</label>
        <input type="number" id="pr-number" min="1" placeholder="#123" autofocus>
      </div>
      <div class="form-group">
        <label for="pr-policy">ポリシー</label>
        <select class="policy-select" id="pr-policy">
          {% for p in policy_options %}
          <option value="{{ p }}">{{ p }}</option>
          {% endfor %}
        </select>
      </div>
      <button class="btn" id="verify-btn" onclick="verifyPR()" style="font-size:0.8rem;align-self:flex-end">
        検証を実行
      </button>
    </div>
    <p style="font-family:var(--font-mono);font-size:0.72rem;color:var(--text-secondary)">
      PRのコミット署名、CIステータス、レビュー承認、依存関係変更などをSDLCコントロールに照合します。
    </p>
  </div>

  <div id="result-area"></div>
{% endblock %}

{% block scripts %}
<script>
const OWNER = '{{ owner }}';
const REPO = '{{ repo }}';

async function verifyPR() {
  const prNum = document.getElementById('pr-number').value;
  if (!prNum || prNum < 1) {
    alert('PR番号を入力してください');
    return;
  }
  const policy = document.getElementById('pr-policy').value;
  const btn = document.getElementById('verify-btn');
  const area = document.getElementById('result-area');

  btn.disabled = true;
  btn.textContent = '検証中…';
  btn.style.borderColor = 'var(--accent-gold)';
  btn.style.color = 'var(--accent-gold)';
  area.innerHTML = '<div class="loading">検証を実行中</div>';

  try {
    const resp = await fetch(`/api/repos/${OWNER}/${REPO}/verify-pr/${prNum}?policy=${encodeURIComponent(policy)}`, { method: 'POST' });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    renderResult(data, prNum);
  } catch (e) {
    area.innerHTML = `<div class="card" style="border-color:var(--accent-vermillion)">
      <div style="font-family:var(--font-mono);font-size:0.8rem;color:var(--accent-vermillion);margin-bottom:0.5rem">検証に失敗しました</div>
      <div style="font-family:var(--font-mono);font-size:0.72rem;color:var(--text-secondary)">${e.message}</div>
    </div>`;
  }
  btn.disabled = false;
  btn.textContent = '検証を実行';
  btn.style.borderColor = '';
  btn.style.color = '';
}

function renderResult(data, prNum) {
  const area = document.getElementById('result-area');
  const findings = (data.report && data.report.findings) || [];
  let pass = 0, fail = 0, review = 0, na = 0;
  for (const f of findings) {
    if (f.status === 'Satisfied') pass++;
    else if (f.status === 'Violated') fail++;
    else if (f.status === 'Indeterminate') review++;
    else na++;
  }

  const rows = findings.map(f => {
    let badge = '';
    if (f.status === 'Satisfied') badge = '<span class="badge badge-pass">PASS</span>';
    else if (f.status === 'Violated') badge = '<span class="badge badge-fail">FAIL</span>';
    else if (f.status === 'Indeterminate') badge = '<span class="badge badge-review">REVIEW</span>';
    else badge = '<span class="badge badge-na">N/A</span>';
    return `<tr>
      <td>${f.control_id}</td>
      <td>${badge}</td>
      <td class="rationale-cell">${f.rationale || ''}</td>
    </tr>`;
  }).join('');

  area.innerHTML = `
    <div style="margin-top:1.5rem">
      <div class="section-title">PR #${prNum} 検証結果</div>
      <div class="summary-bar">
        <div class="summary-item"><span class="badge badge-pass">PASS</span> ${pass}</div>
        <div class="summary-item"><span class="badge badge-review">REVIEW</span> ${review}</div>
        <div class="summary-item"><span class="badge badge-fail">FAIL</span> ${fail}</div>
        ${na > 0 ? `<div class="summary-item"><span class="badge badge-na">N/A</span> ${na}</div>` : ''}
      </div>
      <div class="card" style="padding:0;overflow-x:auto">
        <table class="findings-table">
          <thead>
            <tr><th>Control</th><th>Status</th><th>Rationale</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

// Auto-focus and handle Enter key
document.getElementById('pr-number').addEventListener('keydown', e => {
  if (e.key === 'Enter') verifyPR();
});
</script>
{% endblock %}
