{% extends "base.html" %}

{% block title %}Repositories{% endblock %}

{% block head %}
<style>
.repo-grid {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.repo-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color 0.2s ease;
}
.repo-card:hover {
  border-color: var(--accent-gold);
}
.repo-info {
  flex: 1;
  min-width: 0;
}
.repo-name {
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 0.25rem;
}
.repo-name a {
  color: var(--text-primary);
  text-decoration: none;
}
.repo-name a:hover {
  color: var(--accent-gold);
}
.repo-meta {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.repo-actions {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-shrink: 0;
  margin-left: 1rem;
}
.result-summary {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}
.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--text-secondary);
  font-size: 0.9rem;
}
@media (max-width: 600px) {
  .repo-card { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
  .repo-actions { margin-left: 0; }
}
</style>
{% endblock %}

{% block content %}
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">
    <div class="section-title" id="repos-title" style="margin-bottom:0">リポジトリ</div>
    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap" id="toolbar">
      <select class="policy-select" id="org-filter" onchange="filterByOrg(this.value)" aria-label="組織フィルタ" style="display:none">
        <option value="">全組織</option>
      </select>
      <select class="policy-select" id="sort-select" onchange="sortRepos(this.value)" aria-label="ソート順">
        <option value="activity" selected>アクティビティ順</option>
        <option value="name">名前順</option>
        <option value="fail-desc">FAIL多い順</option>
        <option value="fail-asc">FAIL少ない順</option>
        <option value="unverified">未検証優先</option>
      </select>
      <button class="verify-btn" id="export-csv-btn" onclick="exportCSV()" style="display:none">CSV出力</button>
      <button class="btn" id="verify-all-btn" onclick="verifyAll()" style="font-size:0.72rem;display:none">全リポジトリを検証</button>
    </div>
  </div>
  <div id="dashboard-summary" class="dashboard-summary" style="display:none" aria-label="検証サマリー"></div>
  <div id="verify-all-progress" style="display:none;margin-bottom:1rem">
    <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;font-family:var(--font-mono);font-size:0.75rem;color:var(--text-secondary)">
      <span id="progress-text">0 / 0</span>
      <div style="margin-top:0.5rem;height:4px;background:var(--bg-deep);border-radius:2px;overflow:hidden">
        <div id="progress-bar" style="height:100%;background:var(--accent-vermillion);width:0%;transition:width 0.3s ease"></div>
      </div>
    </div>
  </div>
  <div id="repo-list" aria-live="polite">
    <div class="loading" role="status">リポジトリを取得中</div>
  </div>
{% endblock %}

{% block scripts %}
<script>
const POLICY_OPTIONS = `{% for p in policy_options %}<option value="{{ p }}">{{ p }}</option>{% endfor %}`;

function renderBadges(pass, fail, review) {
  let b = '';
  if (pass > 0) b += `<span class="badge badge-pass">PASS ${pass}</span>`;
  if (review > 0) b += `<span class="badge badge-review">REVIEW ${review}</span>`;
  if (fail > 0) b += `<span class="badge badge-fail">FAIL ${fail}</span>`;
  return b;
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


function filterRepos() {
  applyFilters();
}

function renderRepoList(repos, cacheArr) {
  const cacheMap = {};
  for (const c of (cacheArr || [])) {
    cacheMap[`${c.owner}/${c.repo}`] = c;
  }

  const container = document.getElementById('repo-list');
  document.getElementById('repos-title').textContent = `リポジトリ (${repos.length})`;

  if (repos.length === 0) {
    container.innerHTML = '<div class="empty-state">リポジトリが見つかりません。GitHub Appをインストールしてください。</div>';
    return;
  }

  const searchBar = `<div style="margin-bottom:0.75rem">
    <input type="search" id="search-input" class="policy-select" style="width:100%;padding:0.5rem 0.75rem;font-size:0.8rem" placeholder="リポジトリを検索…" oninput="filterRepos()" aria-label="リポジトリを検索">
  </div>`;

  const cards = repos.map(r => {
    const cached = cacheMap[r.full_name];
    const cachedBadges = cached ? renderBadges(cached.pass, cached.fail, cached.review) : '<span class="badge badge-na">未検証</span>';
    const cachedTime = cached ? `<span style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-secondary)" title="最終検証">${cached.verified_at}</span>` : '';
    const desc = r.description ? `<div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-secondary);margin-top:0.2rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:500px">${esc(r.description)}</div>` : '';

    return `<div class="repo-card" id="repo-${esc(r.full_name.replace('/', '-'))}" data-name="${esc(r.full_name.toLowerCase())}" data-desc="${esc((r.description || '').toLowerCase())}" data-lang="${esc((r.language || '').toLowerCase())}" data-pushed="${esc(r.pushed_at || '')}" data-status="${cached ? (cached.fail > 0 ? 'fail' : (cached.review > 0 ? 'review' : 'pass')) : 'unverified'}">
      <div class="repo-info">
        <div class="repo-name">
          <a href="/repos/${encodeURIComponent(r.owner)}/${encodeURIComponent(r.name)}">${esc(r.full_name)}</a>
          <a class="gh-link" href="https://github.com/${encodeURIComponent(r.owner)}/${encodeURIComponent(r.name)}" target="_blank" rel="noopener" title="GitHub で開く" aria-label="${esc(r.full_name)} を GitHub で開く">
            <svg viewBox="0 0 16 16"><path d="M3.75 2h3.5a.75.75 0 010 1.5H4.56l6.22 6.22a.75.75 0 11-1.06 1.06L3.5 4.56v2.69a.75.75 0 01-1.5 0v-3.5A1.75 1.75 0 013.75 2z"/><path d="M9.25 3.5a.75.75 0 010-1.5h3A1.75 1.75 0 0114 3.75v8.5A1.75 1.75 0 0112.25 14h-8.5A1.75 1.75 0 012 12.25v-3a.75.75 0 011.5 0v3c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25v-8.5a.25.25 0 00-.25-.25h-3z"/></svg>
          </a>
        </div>
        ${desc}
        <div class="repo-meta">
          ${r.private ? '<span class="badge badge-private">private</span>' : ''}
          ${r.language ? `<span>${esc(r.language)}</span>` : ''}
          ${r.default_branch ? `<span>${esc(r.default_branch)}</span>` : ''}
          ${cachedTime}
        </div>
      </div>
      <div class="repo-actions">
        <div class="result-summary" id="result-${r.full_name.replace('/', '-')}">${cachedBadges}</div>
        <select class="policy-select" id="policy-${r.full_name.replace('/', '-')}" aria-label="${esc(r.full_name)} のポリシー選択">${POLICY_OPTIONS}</select>
        <button class="verify-btn" onclick="verifyRepo('${esc(r.owner)}', '${esc(r.name)}', this)">${cached ? '再検証' : '検証'}</button>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = searchBar + '<div class="repo-grid">' + cards + '</div>';
  allRepos = repos;
  allCache = cacheMap;
  if (repos.length > 0) {
    document.getElementById('verify-all-btn').style.display = '';
    document.getElementById('export-csv-btn').style.display = '';
  }
  // Dashboard summary
  let failRepos = 0, reviewRepos = 0, passRepos = 0, unverifiedRepos = 0;
  repos.forEach(r => {
    const c = cacheMap[r.full_name];
    if (!c) { unverifiedRepos++; return; }
    if (c.fail > 0) failRepos++;
    else if (c.review > 0) reviewRepos++;
    else passRepos++;
  });
  const summaryEl = document.getElementById('dashboard-summary');
  summaryEl.style.display = '';
  summaryEl.innerHTML = `
    <div class="summary-card summary-card-fail" role="button" tabindex="0" aria-pressed="false" onclick="filterByStatus('fail')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();filterByStatus('fail')}" title="FAILのあるリポジトリのみ表示">
      <div class="summary-card-count">${failRepos}</div>
      <div class="summary-card-label">FAIL</div>
    </div>
    <div class="summary-card summary-card-review" role="button" tabindex="0" aria-pressed="false" onclick="filterByStatus('review')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();filterByStatus('review')}" title="REVIEWのあるリポジトリのみ表示">
      <div class="summary-card-count">${reviewRepos}</div>
      <div class="summary-card-label">REVIEW</div>
    </div>
    <div class="summary-card summary-card-pass" role="button" tabindex="0" aria-pressed="false" onclick="filterByStatus('pass')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();filterByStatus('pass')}" title="PASSのリポジトリのみ表示">
      <div class="summary-card-count">${passRepos}</div>
      <div class="summary-card-label">PASS</div>
    </div>
    <div class="summary-card summary-card-unverified" role="button" tabindex="0" aria-pressed="false" onclick="filterByStatus('unverified')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();filterByStatus('unverified')}" title="未検証のリポジトリのみ表示">
      <div class="summary-card-count">${unverifiedRepos}</div>
      <div class="summary-card-label">未検証</div>
    </div>
  `;

  // Populate org filter
  const orgs = [...new Set(repos.map(r => r.owner))].sort();
  const orgFilter = document.getElementById('org-filter');
  if (orgs.length > 1) {
    orgFilter.innerHTML = '<option value="">全組織</option>' + orgs.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join('');
    orgFilter.style.display = '';
  }
}

async function loadRepos() {
  try {
    const [repos, cache] = await Promise.all([
      swrFetch('/api/repos'),
      swrFetch('/api/verification-cache'),
    ]);
    renderRepoList(repos, cache);
  } catch (e) {
    renderLoadError('repo-list', 'リポジトリの取得に失敗しました。', 'loadRepos');
  }
}

async function verifyRepo(owner, repo, btn) {
  btn.disabled = true;
  btn.classList.add('running');
  btn.textContent = '検証中…';
  const resultEl = document.getElementById(`result-${owner}-${repo}`);
  resultEl.innerHTML = '';

  const policyEl = document.getElementById(`policy-${owner}-${repo}`);
  const policy = policyEl ? policyEl.value : 'default';

  try {
    const resp = await fetch(`/api/repos/${owner}/${repo}/verify?policy=${encodeURIComponent(policy)}`, { method: 'POST' });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();

    let pass = 0, fail = 0, review = 0;
    if (data.findings) {
      for (const f of data.findings) {
        if (f.status === 'satisfied') pass++;
        else if (f.status === 'violated') fail++;
        else if (f.status === 'indeterminate') review++;
      }
    }
    resultEl.innerHTML = renderBadges(pass, fail, review);

    btn.textContent = '再検証';
  } catch (e) {
    resultEl.innerHTML = '<span class="badge badge-fail">ERROR</span>';
    btn.textContent = '再試行';
  }
  btn.disabled = false;
  btn.classList.remove('running');
}

let allRepos = [];
let allCache = {};

function sortRepos(mode) {
  const grid = document.querySelector('.repo-grid');
  if (!grid) return;
  const cards = Array.from(grid.children);
  cards.sort((a, b) => {
    const nameA = a.dataset.name || '';
    const nameB = b.dataset.name || '';
    const cA = allCache[nameA.replace('-', '/')] || {};
    const cB = allCache[nameB.replace('-', '/')] || {};
    if (mode === 'activity') {
      const pA = a.dataset.pushed || '';
      const pB = b.dataset.pushed || '';
      return pB.localeCompare(pA);
    }
    if (mode === 'fail-desc') return (cB.fail || 0) - (cA.fail || 0);
    if (mode === 'fail-asc') return (cA.fail || 0) - (cB.fail || 0);
    if (mode === 'unverified') {
      const vA = cA.verified_at ? 1 : 0;
      const vB = cB.verified_at ? 1 : 0;
      return vA - vB;
    }
    return nameA.localeCompare(nameB);
  });
  cards.forEach(c => grid.appendChild(c));
}

let activeFilter = null;

function filterByStatus(status) {
  const summaryCards = document.querySelectorAll('.summary-card');

  if (activeFilter === status) {
    activeFilter = null;
    summaryCards.forEach(c => { c.classList.remove('active'); c.setAttribute('aria-pressed', 'false'); });
  } else {
    activeFilter = status;
    summaryCards.forEach(c => { c.classList.remove('active'); c.setAttribute('aria-pressed', 'false'); });
    document.querySelector(`.summary-card-${status}`).classList.add('active');
    document.querySelector(`.summary-card-${status}`).setAttribute('aria-pressed', 'true');
  }
  applyFilters();
}

let activeOrg = '';

function filterByOrg(org) {
  activeOrg = org;
  applyFilters();
}

function applyFilters() {
  const cards = document.querySelectorAll('.repo-card');
  let visible = 0;
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();

  cards.forEach(c => {
    const name = c.dataset.name || '';
    const status = c.dataset.status || '';
    const desc = c.dataset.desc || '';
    const lang = c.dataset.lang || '';

    let show = true;
    if (activeOrg && !name.startsWith(activeOrg.toLowerCase() + '/')) show = false;
    if (activeFilter && status !== activeFilter) show = false;
    if (q && !name.includes(q) && !desc.includes(q) && !lang.includes(q)) show = false;

    c.style.display = show ? '' : 'none';
    if (show) visible++;
  });

  document.getElementById('repos-title').textContent = `リポジトリ (${visible} / ${cards.length})`;

  // Update dashboard summary for filtered subset
  updateDashboardSummary();
}

function updateDashboardSummary() {
  const cards = document.querySelectorAll('.repo-card');
  let failRepos = 0, reviewRepos = 0, passRepos = 0, unverifiedRepos = 0;
  cards.forEach(c => {
    if (c.style.display === 'none') return;
    const s = c.dataset.status;
    if (s === 'fail') failRepos++;
    else if (s === 'review') reviewRepos++;
    else if (s === 'pass') passRepos++;
    else unverifiedRepos++;
  });
  const el = document.getElementById('dashboard-summary');
  if (!el) return;
  const countEls = el.querySelectorAll('.summary-card-count');
  if (countEls.length === 4) {
    countEls[0].textContent = failRepos;
    countEls[1].textContent = reviewRepos;
    countEls[2].textContent = passRepos;
    countEls[3].textContent = unverifiedRepos;
  }
}

function exportCSV() {
  const btn = document.getElementById('export-csv-btn');
  const origText = btn.textContent;
  btn.textContent = '出力中…';
  btn.disabled = true;
  const rows = [['リポジトリ','言語','公開範囲','ポリシー','PASS','FAIL','REVIEW','N/A','検証日時']];
  allRepos.forEach(r => {
    const c = allCache[r.full_name] || {};
    rows.push([
      r.full_name,
      r.language || '',
      r.private ? '非公開' : '公開',
      c.policy || '',
      c.pass || 0,
      c.fail || 0,
      c.review || 0,
      c.na || 0,
      c.verified_at || '未検証',
    ]);
  });
  const csv = '\uFEFF' + rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `metsuke-verification-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  btn.textContent = origText;
  btn.disabled = false;
}

async function verifyAll() {
  if (!confirm(`${allRepos.length} 個のリポジトリを一括検証します。よろしいですか？`)) return;
  const btn = document.getElementById('verify-all-btn');
  const progressWrap = document.getElementById('verify-all-progress');
  const progressText = document.getElementById('progress-text');
  const progressBar = document.getElementById('progress-bar');
  btn.disabled = true;
  btn.textContent = '検証中…';
  progressWrap.style.display = 'block';
  let done = 0;
  const total = allRepos.length;
  progressText.textContent = `0 / ${total}`;
  for (const r of allRepos) {
    const verifyBtn = document.querySelector(`#repo-${r.full_name.replace('/', '-')} .verify-btn`);
    if (verifyBtn) {
      await verifyRepo(r.owner, r.name, verifyBtn);
    }
    done++;
    progressText.textContent = `${done} / ${total}`;
    progressBar.style.width = `${(done / total * 100).toFixed(1)}%`;
  }
  btn.disabled = false;
  btn.textContent = '全リポジトリを検証';
}

loadRepos();
</script>
{% endblock %}
