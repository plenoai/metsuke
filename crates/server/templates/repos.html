{% extends "base.html" %}

{% block title %}Repositories{% endblock %}

{% block head %}
<style>
.repo-grid {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.repo-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color 0.2s ease;
}
.repo-card:hover {
  border-color: var(--accent-gold);
}
.repo-info {
  flex: 1;
  min-width: 0;
}
.repo-name {
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 0.25rem;
}
.repo-name a {
  color: var(--text-primary);
  text-decoration: none;
}
.repo-name a:hover {
  color: var(--accent-gold);
}
.repo-meta {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.repo-actions {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-shrink: 0;
  margin-left: 1rem;
}
.result-summary {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}
@media (max-width: 600px) {
  .repo-card { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
  .repo-actions { margin-left: 0; }
}
</style>
{% endblock %}

{% block content %}
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">
    <div class="section-title" id="repos-title" style="margin-bottom:0">リポジトリ</div>
    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap" id="toolbar">
      <select class="policy-select" id="org-filter" onchange="filterByOrg(this.value)" aria-label="組織フィルタ" style="display:none">
        <option value="">全組織</option>
      </select>
      <select class="policy-select" id="sort-select" onchange="sortRepos(this.value)" aria-label="ソート順">
        <option value="activity" selected>アクティビティ順</option>
        <option value="name">名前順</option>
        <option value="fail-desc">FAIL多い順</option>
        <option value="fail-asc">FAIL少ない順</option>
        <option value="unverified">未検証優先</option>
      </select>
      <button class="verify-btn" id="export-csv-btn" onclick="exportCSV()" style="display:none">CSV出力</button>
      <button class="btn" id="verify-all-btn" onclick="verifyAll()" style="font-size:0.72rem;display:none">全リポジトリを検証</button>
    </div>
  </div>
  <div id="verify-all-progress" style="display:none;margin-bottom:1rem" aria-live="polite">
    <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;font-family:var(--font-mono);font-size:0.75rem;color:var(--text-secondary)">
      <span id="progress-text" role="status">0 / 0</span>
      <div style="margin-top:0.5rem;height:4px;background:var(--bg-deep);border-radius:2px;overflow:hidden">
        <div id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="検証進捗" style="height:100%;background:var(--accent-vermillion);width:0%;transition:width 0.3s ease"></div>
      </div>
    </div>
  </div>
  <div id="repo-list" aria-live="polite">
    <div class="loading" role="status">リポジトリを取得中</div>
  </div>
{% endblock %}

{% block scripts %}
<script>
const POLICY_OPTIONS = `{% for p in policy_options %}<option value="{{ p }}">{{ p }}</option>{% endfor %}`;
const PAGE_SIZE = 50;

let allRepos = [];
let filteredRepos = [];
let currentPage = 1;
let activeOrg = '';
let currentSort = 'activity';

// ---------------------------------------------------------------------------
// Helpers — RepoRow has pass_count/fail_count/review_count/verified_at inline
// ---------------------------------------------------------------------------

function renderBadges(pass, fail, review) {
  let b = '';
  if (pass > 0) b += `<span class="badge badge-pass">PASS ${pass}</span>`;
  if (review > 0) b += `<span class="badge badge-review">REVIEW ${review}</span>`;
  if (fail > 0) b += `<span class="badge badge-fail">FAIL ${fail}</span>`;
  return b;
}

function repoStatus(r) {
  if (r.verified_at == null) return 'unverified';
  if ((r.fail_count || 0) > 0) return 'fail';
  if ((r.review_count || 0) > 0) return 'review';
  return 'pass';
}

// ---------------------------------------------------------------------------
// Data-driven filter / sort / paginate
// ---------------------------------------------------------------------------

function computeFiltered() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  let list = allRepos;

  if (activeOrg) {
    list = list.filter(r => r.owner.toLowerCase() === activeOrg.toLowerCase());
  }
  if (q) {
    list = list.filter(r =>
      r.full_name.toLowerCase().includes(q) ||
      (r.description || '').toLowerCase().includes(q) ||
      (r.language || '').toLowerCase().includes(q)
    );
  }

  const mode = currentSort;
  list = [...list].sort((a, b) => {
    if (mode === 'activity') return (b.pushed_at || '').localeCompare(a.pushed_at || '');
    if (mode === 'fail-desc') return (b.fail_count || 0) - (a.fail_count || 0);
    if (mode === 'fail-asc') return (a.fail_count || 0) - (b.fail_count || 0);
    if (mode === 'unverified') return (a.verified_at ? 1 : 0) - (b.verified_at ? 1 : 0);
    return a.full_name.toLowerCase().localeCompare(b.full_name.toLowerCase());
  });

  filteredRepos = list;
}

function totalPages() {
  return Math.max(1, Math.ceil(filteredRepos.length / PAGE_SIZE));
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------

function renderCard(r) {
  const hasVerification = r.verified_at != null;
  const badges = hasVerification ? renderBadges(r.pass_count || 0, r.fail_count || 0, r.review_count || 0) : '<span class="badge badge-na">未検証</span>';
  const verifiedTime = hasVerification ? `<span style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-secondary)" title="最終検証">${r.verified_at}</span>` : '';
  return `<div class="repo-card" id="repo-${esc(r.full_name.replace('/', '-'))}">
    <div class="repo-info">
      <div class="repo-name">
        <a href="/repos/${encodeURIComponent(r.owner)}/${encodeURIComponent(r.name)}">${esc(r.full_name)}</a>
        <a class="gh-link" href="https://github.com/${encodeURIComponent(r.owner)}/${encodeURIComponent(r.name)}" target="_blank" rel="noopener" title="GitHub で開く" aria-label="${esc(r.full_name)} を GitHub で開く">
          <svg viewBox="0 0 16 16"><path d="M3.75 2h3.5a.75.75 0 010 1.5H4.56l6.22 6.22a.75.75 0 11-1.06 1.06L3.5 4.56v2.69a.75.75 0 01-1.5 0v-3.5A1.75 1.75 0 013.75 2z"/><path d="M9.25 3.5a.75.75 0 010-1.5h3A1.75 1.75 0 0114 3.75v8.5A1.75 1.75 0 0112.25 14h-8.5A1.75 1.75 0 012 12.25v-3a.75.75 0 011.5 0v3c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25v-8.5a.25.25 0 00-.25-.25h-3z"/></svg>
        </a>
      </div>
      <div class="repo-meta">
        ${r.private ? '<span class="badge badge-private">private</span>' : ''}
        ${r.language ? `<span>${esc(r.language)}</span>` : ''}
        ${r.default_branch ? `<span>${esc(r.default_branch)}</span>` : ''}
        ${verifiedTime}
      </div>
    </div>
    <div class="repo-actions">
      <div class="result-summary" id="result-${r.full_name.replace('/', '-')}">${badges}</div>
      <a class="verify-btn" href="/repos/${encodeURIComponent(r.owner)}/${encodeURIComponent(r.name)}/pulls" style="text-decoration:none;font-size:0.65rem;padding:0.3rem 0.5rem" title="PR検証">PR</a>
      <a class="verify-btn" href="/repos/${encodeURIComponent(r.owner)}/${encodeURIComponent(r.name)}/releases" style="text-decoration:none;font-size:0.65rem;padding:0.3rem 0.5rem" title="リリース検証">Rel</a>
      <select class="policy-select" id="policy-${r.full_name.replace('/', '-')}" aria-label="${esc(r.full_name)} のポリシー選択">${POLICY_OPTIONS}</select>
      <button class="verify-btn" onclick="verifyRepo('${esc(r.owner)}', '${esc(r.name)}', this)">${hasVerification ? '再検証' : '検証'}</button>
    </div>
  </div>`;
}

function renderPagination() {
  const tp = totalPages();
  if (tp <= 1) return '';
  const start = Math.max(1, currentPage - 2);
  const end = Math.min(tp, currentPage + 2);
  let html = '<div class="pagination" style="display:flex;align-items:center;justify-content:center;gap:0.25rem;margin-top:1rem;margin-bottom:1rem;font-family:var(--font-mono);font-size:0.75rem">';
  if (currentPage > 1) html += `<button class="verify-btn" onclick="goToPage(${currentPage - 1})" style="padding:0.25rem 0.5rem">‹</button>`;
  for (let i = start; i <= end; i++) {
    if (i === currentPage) {
      html += `<span style="padding:0.25rem 0.5rem;background:var(--accent-gold);color:var(--bg-deep);border-radius:4px;font-weight:700">${i}</span>`;
    } else {
      html += `<button class="verify-btn" onclick="goToPage(${i})" style="padding:0.25rem 0.5rem">${i}</button>`;
    }
  }
  if (currentPage < tp) html += `<button class="verify-btn" onclick="goToPage(${currentPage + 1})" style="padding:0.25rem 0.5rem">›</button>`;
  html += `<span style="margin-left:0.5rem;color:var(--text-secondary)">${PAGE_SIZE * (currentPage - 1) + 1}–${Math.min(PAGE_SIZE * currentPage, filteredRepos.length)} / ${filteredRepos.length}</span>`;
  html += '</div>';
  return html;
}

function renderPage() {
  computeFiltered();
  if (currentPage > totalPages()) currentPage = totalPages();

  const container = document.getElementById('repo-list');
  const total = allRepos.length;
  const matched = filteredRepos.length;
  const titleText = matched < total ? `リポジトリ (${matched} / ${total})` : `リポジトリ (${total})`;
  document.getElementById('repos-title').textContent = titleText;
  document.title = `Repos (${matched}) — Metsuke`;

  if (total === 0) {
    container.innerHTML = `<div class="empty-state">
      <div style="margin-bottom:0.75rem">リポジトリが見つかりません</div>
      <a class="btn" href="/settings" style="text-decoration:none">GitHub Appをインストール</a>
    </div>`;
    return;
  }

  const prevQ = document.getElementById('search-input')?.value || '';
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRepos = filteredRepos.slice(start, start + PAGE_SIZE);

  const searchBar = `<div style="margin-bottom:0.75rem">
    <input type="search" id="search-input" class="policy-select" style="width:100%;padding:0.5rem 0.75rem;font-size:0.8rem" placeholder="リポジトリを検索…" oninput="onSearchInput()" aria-label="リポジトリを検索" value="${esc(prevQ)}">
  </div>`;

  container.innerHTML = searchBar
    + renderPagination()
    + '<div class="repo-grid">' + pageRepos.map(renderCard).join('') + '</div>'
    + renderPagination();

  if (total > 0) {
    document.getElementById('verify-all-btn').style.display = '';
    document.getElementById('export-csv-btn').style.display = '';
  }


  const orgs = [...new Set(allRepos.map(r => r.owner))].sort();
  const orgFilter = document.getElementById('org-filter');
  if (orgs.length > 1) {
    orgFilter.innerHTML = '<option value="">全組織</option>' + orgs.map(o => `<option value="${esc(o)}" ${activeOrg === o ? 'selected' : ''}>${esc(o)}</option>`).join('');
    orgFilter.style.display = '';
  }
}

// ---------------------------------------------------------------------------
// Event handlers
// ---------------------------------------------------------------------------

let searchTimer = null;
function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; renderPage(); }, 150);
}

function goToPage(p) {
  currentPage = p;
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function sortRepos(mode) {
  currentSort = mode;
  currentPage = 1;
  renderPage();
}


function filterByOrg(org) {
  activeOrg = org;
  currentPage = 1;
  renderPage();
}

// ---------------------------------------------------------------------------
// Data loading: fetch JSON + SSE job events
// ---------------------------------------------------------------------------

async function fetchRepos() {
  const resp = await fetch('/api/repos');
  if (!resp.ok) throw new Error(await resp.text());
  return resp.json();
}

async function loadRepos() {
  try {
    allRepos = await fetchRepos();
    renderPage();
  } catch (e) {
    renderLoadError('repo-list', 'リポジトリの取得に失敗しました。', 'loadRepos');
    return;
  }

  // Subscribe to job events for live updates
  const es = new EventSource('/api/events');
  es.addEventListener('job', async (e) => {
    const event = JSON.parse(e.data);
    if (event.type === 'repos_synced' || event.type === 'verification_complete') {
      try {
        allRepos = await fetchRepos();
        renderPage();
      } catch (_) { /* will retry on next event */ }
    }
  });
  es.onerror = () => {
    // Reconnect is automatic with EventSource; nothing to do
  };
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------

async function verifyRepo(owner, repo, btn) {
  btn.disabled = true;
  btn.classList.add('running');
  btn.textContent = '検証中…';
  const resultEl = document.getElementById(`result-${owner}-${repo}`);
  resultEl.innerHTML = '';

  const policyEl = document.getElementById(`policy-${owner}-${repo}`);
  const policy = policyEl ? policyEl.value : 'default';

  try {
    const resp = await fetch(`/api/repos/${owner}/${repo}/verify?policy=${encodeURIComponent(policy)}`, { method: 'POST' });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();

    let pass = 0, fail = 0, review = 0;
    if (data.findings) {
      for (const f of data.findings) {
        if (f.status === 'satisfied') pass++;
        else if (f.status === 'violated') fail++;
        else if (f.status === 'indeterminate') review++;
      }
    }
    resultEl.innerHTML = renderBadges(pass, fail, review);
    btn.textContent = '再検証';
  } catch (e) {
    resultEl.innerHTML = '<span class="badge badge-fail">ERROR</span>';
    btn.textContent = '再試行';
  }
  btn.disabled = false;
  btn.classList.remove('running');
}

function exportCSV() {
  const btn = document.getElementById('export-csv-btn');
  const origText = btn.textContent;
  btn.textContent = '出力中…';
  btn.disabled = true;
  const rows = [['リポジトリ','言語','公開範囲','PASS','FAIL','REVIEW','検証日時']];
  allRepos.forEach(r => {
    rows.push([
      r.full_name,
      r.language || '',
      r.private ? '非公開' : '公開',
      r.pass_count || 0,
      r.fail_count || 0,
      r.review_count || 0,
      r.verified_at || '未検証',
    ]);
  });
  const csv = '\uFEFF' + rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `metsuke-verification-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  btn.textContent = origText;
  btn.disabled = false;
}

async function verifyAll() {
  const targets = filteredRepos;
  if (!confirm(`${targets.length} 個のリポジトリを一括検証します。よろしいですか？`)) return;
  const btn = document.getElementById('verify-all-btn');
  const progressWrap = document.getElementById('verify-all-progress');
  const progressText = document.getElementById('progress-text');
  const progressBar = document.getElementById('progress-bar');
  btn.disabled = true;
  btn.textContent = '検証中…';
  progressWrap.style.display = 'block';
  let done = 0;
  const total = targets.length;
  progressText.textContent = `0 / ${total}`;
  for (const r of targets) {
    const verifyBtn = document.querySelector(`#repo-${r.full_name.replace('/', '-')} .verify-btn`);
    if (verifyBtn) {
      await verifyRepo(r.owner, r.name, verifyBtn);
    }
    done++;
    const pct = (done / total * 100).toFixed(1);
    progressText.textContent = `${done} / ${total}`;
    progressBar.style.width = `${pct}%`;
    progressBar.setAttribute('aria-valuenow', Math.round(pct));
  }
  btn.disabled = false;
  btn.textContent = '全リポジトリを検証';
}

loadRepos();
</script>
{% endblock %}
