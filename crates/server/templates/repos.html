{% extends "base.html" %}

{% block title %}Repositories{% endblock %}

{% block content %}
  <div class="page-header">
    <div class="section__title u-mb-0" id="repos-title">リポジトリ</div>
    <div class="toolbar" id="toolbar">
      <select class="policy-select" id="org-filter" aria-label="組織フィルタ" hidden>
        <option value="">全組織</option>
      </select>
      <select class="policy-select" id="sort-select" aria-label="ソート順">
        <option value="activity" selected>アクティビティ順</option>
        <option value="compliance">コンプライアンス順</option>
        <option value="name">名前順</option>
      </select>
    </div>
  </div>
  <div id="repo-list" class="flow" aria-live="polite">
    <div class="skeleton__list" role="status" aria-label="読み込み中">
      <div class="skeleton__item"><div class="skeleton__block"><div class="skeleton__line skeleton__line--title"></div><div class="skeleton__line skeleton__line--meta"></div></div><div class="skeleton__line skeleton__line--short"></div></div>
      <div class="skeleton__item"><div class="skeleton__block"><div class="skeleton__line skeleton__line--title"></div><div class="skeleton__line skeleton__line--meta"></div></div><div class="skeleton__line skeleton__line--short"></div></div>
      <div class="skeleton__item"><div class="skeleton__block"><div class="skeleton__line skeleton__line--title"></div><div class="skeleton__line skeleton__line--meta"></div></div><div class="skeleton__line skeleton__line--short"></div></div>
      <div class="skeleton__item"><div class="skeleton__block"><div class="skeleton__line skeleton__line--title"></div><div class="skeleton__line skeleton__line--meta"></div></div><div class="skeleton__line skeleton__line--short"></div></div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
<script src="/static/pages/repos.js"></script>
{% endblock %}
