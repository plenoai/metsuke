{% extends "base.html" %}

{% block title %}Repositories{% endblock %}

{% block head %}
<style>
.repo-grid {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.repo-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color 0.2s ease;
}
.repo-card:hover {
  border-color: var(--accent-gold);
}
.repo-info {
  flex: 1;
  min-width: 0;
}
.repo-name {
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 0.25rem;
}
.repo-name a {
  color: var(--text-primary);
  text-decoration: none;
}
.repo-name a:hover {
  color: var(--accent-gold);
}
.repo-meta {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}
@media (max-width: 600px) {
  .repo-card { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
}
</style>
{% endblock %}

{% block content %}
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">
    <div class="section-title" id="repos-title" style="margin-bottom:0">リポジトリ</div>
    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap" id="toolbar">
      <select class="policy-select" id="org-filter" aria-label="組織フィルタ" style="display:none">
        <option value="">全組織</option>
      </select>
      <select class="policy-select" id="sort-select" aria-label="ソート順">
        <option value="activity" selected>アクティビティ順</option>
        <option value="name">名前順</option>
      </select>
    </div>
  </div>
  <div id="repo-list" aria-live="polite">
    <div class="loading" role="status">リポジトリを取得中</div>
  </div>
{% endblock %}

{% block scripts %}
<script>
const PAGE_SIZE = 50;

let allRepos = [];
let filteredRepos = [];
let currentPage = 1;
let activeOrg = '';
let currentSort = 'activity';

// ---------------------------------------------------------------------------
// Data-driven filter / sort / paginate
// ---------------------------------------------------------------------------

function computeFiltered() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  let list = allRepos;

  if (activeOrg) {
    list = list.filter(r => r.owner.toLowerCase() === activeOrg.toLowerCase());
  }
  if (q) {
    list = list.filter(r =>
      r.full_name.toLowerCase().includes(q) ||
      (r.description || '').toLowerCase().includes(q) ||
      (r.language || '').toLowerCase().includes(q)
    );
  }

  const mode = currentSort;
  list = [...list].sort((a, b) => {
    if (mode === 'activity') return (b.pushed_at || '').localeCompare(a.pushed_at || '');
    return a.full_name.toLowerCase().localeCompare(b.full_name.toLowerCase());
  });

  filteredRepos = list;
}

function totalPages() {
  return Math.max(1, Math.ceil(filteredRepos.length / PAGE_SIZE));
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------

function renderCard(r) {
  return `<div class="repo-card" id="repo-${esc(r.full_name.replace('/', '-'))}">
    <div class="repo-info">
      <div class="repo-name">
        <a href="/repos/${encodeURIComponent(r.owner)}/${encodeURIComponent(r.name)}">${esc(r.full_name)}</a>
        <a class="gh-link" href="https://github.com/${encodeURIComponent(r.owner)}/${encodeURIComponent(r.name)}" target="_blank" rel="noopener" title="GitHub で開く" aria-label="${esc(r.full_name)} を GitHub で開く">
          <svg viewBox="0 0 16 16"><path d="M3.75 2h3.5a.75.75 0 010 1.5H4.56l6.22 6.22a.75.75 0 11-1.06 1.06L3.5 4.56v2.69a.75.75 0 01-1.5 0v-3.5A1.75 1.75 0 013.75 2z"/><path d="M9.25 3.5a.75.75 0 010-1.5h3A1.75 1.75 0 0114 3.75v8.5A1.75 1.75 0 0112.25 14h-8.5A1.75 1.75 0 012 12.25v-3a.75.75 0 011.5 0v3c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25v-8.5a.25.25 0 00-.25-.25h-3z"/></svg>
        </a>
      </div>
      <div class="repo-meta">
        ${r.private ? '<span class="badge badge-private">private</span>' : ''}
        ${r.language ? `<span>${esc(r.language)}</span>` : ''}
        ${r.default_branch ? `<span>${esc(r.default_branch)}</span>` : ''}
        ${r.pushed_at ? `<span>${esc(r.pushed_at)}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function renderPagination() {
  const tp = totalPages();
  if (tp <= 1) return '';
  const start = Math.max(1, currentPage - 2);
  const end = Math.min(tp, currentPage + 2);
  let html = '<div class="pagination" style="display:flex;align-items:center;justify-content:center;gap:0.25rem;margin-top:1rem;margin-bottom:1rem;font-family:var(--font-mono);font-size:0.75rem">';
  if (currentPage > 1) html += `<button class="verify-btn" data-action="page" data-page="${currentPage - 1}" style="padding:0.25rem 0.5rem">‹</button>`;
  for (let i = start; i <= end; i++) {
    if (i === currentPage) {
      html += `<span style="padding:0.25rem 0.5rem;background:var(--accent-gold);color:var(--bg-deep);border-radius:4px;font-weight:700">${i}</span>`;
    } else {
      html += `<button class="verify-btn" data-action="page" data-page="${i}" style="padding:0.25rem 0.5rem">${i}</button>`;
    }
  }
  if (currentPage < tp) html += `<button class="verify-btn" data-action="page" data-page="${currentPage + 1}" style="padding:0.25rem 0.5rem">›</button>`;
  html += `<span style="margin-left:0.5rem;color:var(--text-secondary)">${PAGE_SIZE * (currentPage - 1) + 1}–${Math.min(PAGE_SIZE * currentPage, filteredRepos.length)} / ${filteredRepos.length}</span>`;
  html += '</div>';
  return html;
}

function renderPage() {
  computeFiltered();
  if (currentPage > totalPages()) currentPage = totalPages();

  const container = document.getElementById('repo-list');
  const total = allRepos.length;
  const matched = filteredRepos.length;
  const titleText = matched < total ? `リポジトリ (${matched} / ${total})` : `リポジトリ (${total})`;
  document.getElementById('repos-title').textContent = titleText;
  document.title = `Repos (${matched}) — Metsuke`;

  if (total === 0) {
    container.setHTML(`<div class="empty-state">
      <div style="margin-bottom:0.75rem">リポジトリが見つかりません</div>
      <a class="btn" href="/settings" style="text-decoration:none">GitHub Appをインストール</a>
    </div>`, _sanitizer);
    return;
  }

  const prevQ = document.getElementById('search-input')?.value || '';
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRepos = filteredRepos.slice(start, start + PAGE_SIZE);

  const searchBar = `<div style="margin-bottom:0.75rem">
    <input type="search" id="search-input" class="policy-select" style="width:100%;padding:0.5rem 0.75rem;font-size:0.8rem" placeholder="リポジトリを検索…" aria-label="リポジトリを検索" value="${esc(prevQ)}">
  </div>`;

  container.setHTML(searchBar
    + renderPagination()
    + '<div class="repo-grid">' + pageRepos.map(renderCard).join('') + '</div>'
    + renderPagination(), _sanitizer);

  const orgs = [...new Set(allRepos.map(r => r.owner))].sort();
  const orgFilter = document.getElementById('org-filter');
  if (orgs.length > 1) {
    orgFilter.setHTML('<option value="">全組織</option>' + orgs.map(o => `<option value="${esc(o)}" ${activeOrg === o ? 'selected' : ''}>${esc(o)}</option>`).join(''), _sanitizer);
    orgFilter.style.display = '';
  }
}

// ---------------------------------------------------------------------------
// Event handlers
// ---------------------------------------------------------------------------

let searchTimer = null;
function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; renderPage(); }, 150);
}

function goToPage(p) {
  currentPage = p;
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function sortRepos(mode) {
  currentSort = mode;
  currentPage = 1;
  renderPage();
}


function filterByOrg(org) {
  activeOrg = org;
  currentPage = 1;
  renderPage();
}

// ---------------------------------------------------------------------------
// Data loading: fetch JSON + SSE job events
// ---------------------------------------------------------------------------

async function fetchRepos() {
  const resp = await fetch('/api/repos');
  if (!resp.ok) throw new Error(await resp.text());
  return resp.json();
}

async function loadRepos() {
  try {
    allRepos = await fetchRepos();
    renderPage();
  } catch (e) {
    renderLoadError('repo-list', 'リポジトリの取得に失敗しました。', 'loadRepos');
    return;
  }

  // Subscribe to job events for live updates
  const es = new EventSource('/api/events');
  es.addEventListener('job', async (e) => {
    const event = JSON.parse(e.data);
    if (event.type === 'repos_synced') {
      try {
        allRepos = await fetchRepos();
        renderPage();
      } catch (_) { /* will retry on next event */ }
    }
  });
  es.onerror = () => {
    // Reconnect is automatic with EventSource; nothing to do
  };
}

// Event delegation
document.getElementById('org-filter').addEventListener('change', function() { filterByOrg(this.value); });
document.getElementById('sort-select').addEventListener('change', function() { sortRepos(this.value); });
document.getElementById('repo-list').addEventListener('click', function(e) {
  const pageBtn = e.target.closest('[data-action="page"]');
  if (pageBtn) goToPage(Number(pageBtn.dataset.page));
});
document.getElementById('repo-list').addEventListener('input', function(e) {
  if (e.target.id === 'search-input') onSearchInput();
});

loadRepos();
</script>
{% endblock %}
