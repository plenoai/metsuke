<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Metsuke — SDLC準拠検証ツール。GitHub連携でリポジトリのセキュリティ・コンプライアンスを自動検証。">
<meta property="og:title" content="Metsuke — SDLC Process Inspector">
<meta property="og:description" content="GitHubリポジトリのSDLC準拠を自動検証。SLSA、SOC2、セキュリティコントロールに対応。">
<meta property="og:type" content="website">
<title>Metsuke — SDLC Process Inspector</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/themes.css">
<link rel="stylesheet" href="/static/landing.css">
<script src="/static/theme-init.js"></script>
</head>
<body>
<div class="landing">
  <!-- Atmospheric background layers -->
  <div class="landing__atmosphere">
    <div class="landing__grid-pattern"></div>
    <div class="landing__ink-wash"></div>
    <div class="landing__scan-line"></div>
  </div>

  <!-- Content -->
  <div class="landing__content">
    <!-- Kanji eye motif -->
    <div class="landing__eye-motif">
      <svg class="landing__eye-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle class="landing__eye-ring landing__eye-ring--outer" cx="60" cy="60" r="56" stroke-width="0.5"/>
        <circle class="landing__eye-ring landing__eye-ring--inner" cx="60" cy="60" r="42" stroke-width="0.3"/>
        <image href="/static/favicon.svg" x="30" y="30" width="60" height="60" />
      </svg>
      <span class="landing__kanji">目付</span>
    </div>

    <!-- Sign-in card -->
    <div class="landing__card">
      <h1 class="landing__title">Sign in to Metsuke</h1>
      <p class="landing__subtitle">SDLC Process Inspector</p>
      <a class="landing__btn" href="/auth/login">
        <svg class="landing__btn-icon" viewBox="0 0 16 16" width="18" height="18" fill="currentColor">
          <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>
        </svg>
        Sign in with GitHub
      </a>
    </div>

    <!-- Description -->
    <div class="landing__description-row">
      <div class="landing__divider"></div>
      <p class="landing__description">SDLCプロセスの遵守を監察する。</p>
      <div class="landing__divider"></div>
    </div>

    <!-- Feature pills -->
    <div class="landing__features">
      <span class="landing__pill">SLSA</span>
      <span class="landing__pill">SOC2</span>
      <span class="landing__pill">Security Controls</span>
      <span class="landing__pill">PR Verification</span>
    </div>

    <!-- Footer -->
    <footer class="landing__footer">
      <a class="landing__footer-link" href="https://github.com/plenoai/metsuke">Docs</a>
      <span class="landing__footer-dot"></span>
      <a class="landing__footer-link" href="https://github.com/plenoai/metsuke">Source</a>
      <span class="landing__footer-dot"></span>
      <span class="landing__footer-text">Remote MCP Server for SDLC Compliance</span>
    </footer>
  </div>
</div>
</body>
</html>
