{% extends "base.html" %}

{% block title %}監査ログ{% endblock %}

{% block head %}
<style>
.audit-toolbar {
  display: flex;
  gap: 0.75rem;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.audit-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 0.75rem;
}
.audit-table th {
  text-align: left;
  padding: 0.6rem 0.75rem;
  color: var(--text-secondary);
  font-weight: 500;
  letter-spacing: 0.1em;
  font-size: 0.65rem;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  background: var(--bg-deep);
  white-space: nowrap;
}
.audit-table td {
  padding: 0.6rem 0.75rem;
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: middle;
}
.audit-table tr:hover td {
  background: var(--bg-elevated);
}
.type-badge {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 0.15rem 0.4rem;
  border-radius: 3px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-weight: 500;
}
.type-release {
  background: var(--accent-indigo-dim);
  color: var(--accent-indigo);
  border: 1px solid var(--accent-indigo-border);
}
.type-pr {
  background: var(--accent-gold-dim);
  color: var(--accent-gold);
  border: 1px solid var(--accent-gold-border);
}
.type-repo {
  background: var(--text-secondary-dim);
  color: var(--text-secondary);
  border: 1px solid var(--text-secondary-border);
}
.pagination {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  margin-top: 1rem;
  font-family: var(--font-mono);
  font-size: 0.75rem;
}
.pagination button {
  background: var(--bg-surface);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 0.4rem 0.75rem;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  transition: border-color 0.2s ease;
}
.pagination button:hover:not(:disabled) {
  border-color: var(--accent-gold);
}
.pagination button:disabled {
  opacity: 0.4;
  cursor: default;
}
@media (max-width: 600px) {
  .audit-table { font-size: 0.65rem; }
  .audit-table th, .audit-table td { padding: 0.4rem; }
}
</style>
{% endblock %}

{% block content %}
  <div class="section-title">監査ログ</div>

  <div class="audit-toolbar">
    <select class="policy-select" id="filter-type" aria-label="タイプフィルタ">
      <option value="">全タイプ</option>
      <option value="release">Release</option>
      <option value="pr">PR</option>
      <option value="repo">Repo</option>
    </select>
    <input type="search" class="policy-select" id="filter-repo" placeholder="org/repo で検索…" aria-label="リポジトリ検索" style="min-width:160px">
    <input type="date" class="policy-select" id="filter-from" aria-label="開始日">
    <input type="date" class="policy-select" id="filter-to" aria-label="終了日">
    <select class="policy-select" id="filter-preset" aria-label="期間プリセット">
      <option value="">期間指定…</option>
      <option value="this-quarter">今四半期</option>
      <option value="last-quarter">前四半期</option>
      <option value="ytd">年初来</option>
      <option value="last-12m">過去12ヶ月</option>
    </select>
    <button class="verify-btn" id="export-csv-btn">CSV出力</button>
  </div>

  <div id="audit-content" aria-live="polite"><div class="loading" role="status">監査ログを取得中</div></div>
  <div id="audit-pagination" class="pagination"></div>
{% endblock %}

{% block scripts %}
<script>
let currentOffset = 0;
const PAGE_SIZE = 50;
let allEntries = [];


function typeBadge(type) {
  if (type === 'release') return '<span class="type-badge type-release">release</span>';
  if (type === 'pr') return '<span class="type-badge type-pr">pr</span>';
  return '<span class="type-badge type-repo">repo</span>';
}

function resultBadges(e) {
  let b = '';
  if (e.pass > 0) b += `<span class="badge badge-pass" title="PASS">PASS ${e.pass}</span>`;
  if (e.review > 0) b += `<span class="badge badge-review" title="REVIEW">REV ${e.review}</span>`;
  if (e.fail > 0) b += `<span class="badge badge-fail" title="FAIL">FAIL ${e.fail}</span>`;
  return b || '<span style="color:var(--text-secondary)">—</span>';
}

async function loadAudit() {
  const type = document.getElementById('filter-type').value;
  const container = document.getElementById('audit-content');
  container.setHTML('<div class="loading">監査ログを取得中</div>', _sanitizer);

  try {
    let url = `/api/audit-history?limit=${PAGE_SIZE}&offset=${currentOffset}`;
    if (type) url += `&type=${encodeURIComponent(type)}`;
    const fromDate = document.getElementById('filter-from').value;
    const toDate = document.getElementById('filter-to').value;
    if (fromDate) url += `&from_date=${encodeURIComponent(fromDate)}`;
    if (toDate) url += `&to_date=${encodeURIComponent(toDate)}`;
    const repoFilter = document.getElementById('filter-repo').value.trim();
    if (repoFilter) {
      const parts = repoFilter.split('/');
      if (parts.length === 2) {
        url += `&owner=${encodeURIComponent(parts[0])}&repo=${encodeURIComponent(parts[1])}`;
      } else {
        url += `&owner=${encodeURIComponent(repoFilter)}`;
      }
    }
    const resp = await fetch(url);
    const entries = resp.ok ? await resp.json() : [];
    allEntries = entries;

    if (entries.length === 0 && currentOffset === 0) {
      container.setHTML(`<div class="empty-state">
        <div style="margin-bottom:0.75rem">監査ログはまだありません</div>
        <a class="btn" href="/repos" style="text-decoration:none">リポジトリ一覧へ</a>
      </div>`, _sanitizer);
      document.getElementById('audit-pagination').setHTML('', _sanitizer);
      return;
    }

    const rows = entries.map(e => `<tr>
      <td style="white-space:nowrap;color:var(--text-secondary);font-size:0.68rem">${new Date(e.verified_at + 'Z').toLocaleString('ja-JP')}</td>
      <td>${typeBadge(e.type)}</td>
      <td><a href="/repos/${encodeURIComponent(e.owner)}/${encodeURIComponent(e.repo)}" style="color:var(--text-primary);text-decoration:none">${esc(e.owner)}/${esc(e.repo)}</a></td>
      <td style="font-size:0.72rem">${esc(e.target_ref)}</td>
      <td style="font-size:0.68rem;color:var(--text-secondary)">${esc(e.policy)}</td>
      <td style="display:flex;gap:0.2rem">${resultBadges(e)}</td>
    </tr>`).join('');

    container.setHTML(`<div class="card" style="padding:0;overflow-x:auto">
      <table class="audit-table">
        <thead>
          <tr><th scope="col">日時</th><th scope="col">タイプ</th><th scope="col">リポジトリ</th><th scope="col">対象</th><th scope="col">ポリシー</th><th scope="col">結果</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`, _sanitizer);

    // Update page title with context
    const filterParts = [];
    if (type) filterParts.push(type);
    if (repoFilter) filterParts.push(repoFilter);
    document.title = filterParts.length > 0
      ? `監査ログ: ${filterParts.join(' ')} (${entries.length}件) — Metsuke`
      : `監査ログ (${currentOffset + 1}-${currentOffset + entries.length}) — Metsuke`;

    // Pagination
    const pag = document.getElementById('audit-pagination');
    pag.setHTML(`
      <button data-action="prev-page" ${currentOffset === 0 ? 'disabled' : ''}>前へ</button>
      <span style="color:var(--text-secondary);align-self:center">${currentOffset + 1}〜${currentOffset + entries.length} 件</span>
      <button data-action="next-page" ${entries.length < PAGE_SIZE ? 'disabled' : ''}>次へ</button>
    `, _sanitizer);
  } catch (e) {
    renderLoadError('audit-content', '監査ログの取得に失敗しました。', 'loadAudit');
  }
}

function prevPage() {
  currentOffset = Math.max(0, currentOffset - PAGE_SIZE);
  loadAudit();
}

function nextPage() {
  currentOffset += PAGE_SIZE;
  loadAudit();
}

function exportAuditCSV() {
  const btn = document.getElementById('export-csv-btn');
  btn.textContent = '出力中…';
  btn.disabled = true;
  let url = '/api/audit-history/export?';
  const type = document.getElementById('filter-type').value;
  if (type) url += `type=${encodeURIComponent(type)}&`;
  const fromDate = document.getElementById('filter-from').value;
  const toDate = document.getElementById('filter-to').value;
  if (fromDate) url += `from_date=${encodeURIComponent(fromDate)}&`;
  if (toDate) url += `to_date=${encodeURIComponent(toDate)}&`;
  const repoFilter = document.getElementById('filter-repo').value.trim();
  if (repoFilter) {
    const parts = repoFilter.split('/');
    if (parts.length === 2) {
      url += `owner=${encodeURIComponent(parts[0])}&repo=${encodeURIComponent(parts[1])}&`;
    } else {
      url += `owner=${encodeURIComponent(repoFilter)}&`;
    }
  }
  window.location = url;
  setTimeout(() => { btn.textContent = 'CSV出力'; btn.disabled = false; }, 1500);
}

function resetAndLoad() {
  currentOffset = 0;
  loadAudit();
}

function applyPreset(val) {
  const from = document.getElementById('filter-from');
  const to = document.getElementById('filter-to');
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const q = Math.floor(m / 3);

  if (val === 'this-quarter') {
    from.value = `${y}-${String(q * 3 + 1).padStart(2, '0')}-01`;
    to.value = '';
  } else if (val === 'last-quarter') {
    const lq = q === 0 ? 3 : q - 1;
    const ly = q === 0 ? y - 1 : y;
    from.value = `${ly}-${String(lq * 3 + 1).padStart(2, '0')}-01`;
    to.value = `${q === 0 ? y - 1 : y}-${String(q * 3 + 1).padStart(2, '0')}-01`;
  } else if (val === 'ytd') {
    from.value = `${y}-01-01`;
    to.value = '';
  } else if (val === 'last-12m') {
    const past = new Date(now);
    past.setFullYear(past.getFullYear() - 1);
    from.value = past.toISOString().slice(0, 10);
    to.value = '';
  } else {
    from.value = '';
    to.value = '';
  }
  resetAndLoad();
}

let debounceTimer = null;
function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => resetAndLoad(), 400);
}

// Event listeners
document.getElementById('filter-type').addEventListener('change', resetAndLoad);
document.getElementById('filter-repo').addEventListener('change', resetAndLoad);
document.getElementById('filter-repo').addEventListener('input', debounceLoad);
document.getElementById('filter-from').addEventListener('change', resetAndLoad);
document.getElementById('filter-to').addEventListener('change', resetAndLoad);
document.getElementById('filter-preset').addEventListener('change', function() { applyPreset(this.value); });
document.getElementById('export-csv-btn').addEventListener('click', exportAuditCSV);
document.getElementById('audit-pagination').addEventListener('click', function(e) {
  const prev = e.target.closest('[data-action="prev-page"]');
  if (prev && !prev.disabled) prevPage();
  const next = e.target.closest('[data-action="next-page"]');
  if (next && !next.disabled) nextPage();
});

loadAudit();
</script>
{% endblock %}
