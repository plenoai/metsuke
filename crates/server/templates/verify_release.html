{% extends "base.html" %}

{% block title %}Release検証 — {{ owner }}/{{ repo }}{% endblock %}

{% block content %}
  <div class="breadcrumb">
    <a href="/repos">リポジトリ</a> / <a href="/repos/{{ owner }}/{{ repo }}">{{ owner }}/{{ repo }}</a> / Release検証
  </div>

  <div class="section-title">Release 検証</div>

  <div class="card">
    <div class="release-form">
      <div class="form-group">
        <label for="base-tag">Base Tag</label>
        <select id="base-tag"><option value="">読み込み中…</option></select>
      </div>
      <div class="form-group">
        <label for="head-tag">Head Tag</label>
        <select id="head-tag"><option value="">読み込み中…</option></select>
      </div>
      <div class="form-group">
        <label for="release-policy">Policy</label>
        <select class="policy-select" id="release-policy">
          {% for p in policy_options %}
          <option value="{{ p }}">{{ p }}</option>
          {% endfor %}
        </select>
      </div>
      <button class="btn" id="verify-btn">
        検証を実行
      </button>
    </div>
  </div>

  <div id="release-list-section" class="mt-md">
    <div class="section-title">リリース一覧</div>
    <div id="release-list" aria-live="polite">
      <div class="skeleton-list" role="status" aria-label="読み込み中">
        <div class="skeleton-item"><div class="skeleton-block"><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div></div><div class="skeleton-line skeleton-line--short"></div></div>
        <div class="skeleton-item"><div class="skeleton-block"><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div></div><div class="skeleton-line skeleton-line--short"></div></div>
        <div class="skeleton-item"><div class="skeleton-block"><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div></div><div class="skeleton-line skeleton-line--short"></div></div>
      </div>
    </div>
  </div>

  <div id="result-area" aria-live="polite"></div>
{% endblock %}

{% block scripts %}
<script src="/static/pages/verify-release.js" data-owner="{{ owner }}" data-repo="{{ repo }}"></script>
{% endblock %}
