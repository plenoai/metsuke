{% extends "base.html" %}

{% block title %}Release検証 — {{ owner }}/{{ repo }}{% endblock %}

{% block head %}
<style>
.release-form {
  display: flex;
  gap: 0.75rem;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.form-group select, .form-group input { min-width: 140px; }
.release-list {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}
.release-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 0.75rem;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: border-color 0.2s ease;
  gap: 0.75rem;
}
.release-item:hover {
  border-color: var(--border);
}
.release-item-info {
  flex: 1;
  min-width: 0;
}
.release-item-tag {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 700;
  margin-bottom: 0.15rem;
}
.release-item-meta {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-secondary);
  display: flex;
  gap: 0.6rem;
}
.release-prerelease {
  background: var(--accent-gold-dim);
  color: var(--accent-gold);
  border: 1px solid var(--accent-gold-border);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
}
@media (max-width: 600px) {
  .release-form { flex-direction: column; align-items: stretch; }
  .form-group select { width: 100%; }
  .findings-table { font-size: 0.65rem; }
  .release-item { flex-direction: column; align-items: flex-start; }
}
</style>
{% endblock %}

{% block content %}
  <div class="breadcrumb">
    <a href="/repos">リポジトリ</a> / <a href="/repos/{{ owner }}/{{ repo }}">{{ owner }}/{{ repo }}</a> / Release検証
  </div>

  <div class="section-title">Release 検証</div>

  <div class="card">
    <div class="release-form">
      <div class="form-group">
        <label for="base-tag">Base Tag</label>
        <select id="base-tag"><option value="">読み込み中…</option></select>
      </div>
      <div class="form-group">
        <label for="head-tag">Head Tag</label>
        <select id="head-tag"><option value="">読み込み中…</option></select>
      </div>
      <div class="form-group">
        <label for="release-policy">Policy</label>
        <select class="policy-select" id="release-policy">
          {% for p in policy_options %}
          <option value="{{ p }}">{{ p }}</option>
          {% endfor %}
        </select>
      </div>
      <button class="btn" id="verify-btn" style="font-size:0.8rem;align-self:flex-end">
        検証を実行
      </button>
    </div>
  </div>

  <div id="release-list-section" style="margin-top:1.5rem">
    <div class="section-title">リリース一覧</div>
    <div id="release-list" aria-live="polite"><div class="loading" role="status">リリースを取得中</div></div>
  </div>

  <div id="result-area" aria-live="polite"></div>
{% endblock %}

{% block scripts %}
<script>
const OWNER = '{{ owner }}';
const REPO = '{{ repo }}';
let allReleases = [];

function renderReleaseList(releases) {
  allReleases = releases;

  const baseSelect = document.getElementById('base-tag');
  const headSelect = document.getElementById('head-tag');
  if (releases.length < 2) {
    baseSelect.setHTML('<option value="">タグが不足しています</option>');
    headSelect.setHTML('<option value="">タグが不足しています</option>');
  } else {
    const opts = releases.map(r => `<option value="${esc(r.tag_name)}">${esc(r.tag_name)}</option>`).join('');
    baseSelect.setHTML(opts);
    headSelect.setHTML(opts);
    baseSelect.value = releases[1].tag_name;
    headSelect.value = releases[0].tag_name;
  }

  const container = document.getElementById('release-list');
  if (releases.length === 0) {
    container.setHTML('<div style="font-family:var(--font-mono);font-size:0.8rem;color:var(--text-secondary);padding:1rem 0">リリースはありません</div>');
    return;
  }
  container.setHTML('<div class="release-list">' + releases.map((rel, i) => {
    const prevTag = i < releases.length - 1 ? releases[i + 1].tag_name : null;
    const date = rel.published_at || rel.created_at;
    const name = rel.name || rel.tag_name;
    return `<div class="release-item">
      <div class="release-item-info">
        <div class="release-item-tag">
          ${esc(rel.tag_name)}
          ${name !== rel.tag_name ? `<span style="font-weight:400;color:var(--text-secondary);font-size:0.75rem;margin-left:0.5rem">${esc(name)}</span>` : ''}
        </div>
        <div class="release-item-meta">
          <span>${esc(rel.author)}</span>
          <span>${new Date(date).toLocaleDateString('ja-JP')}</span>
          ${rel.prerelease ? '<span class="release-prerelease">pre-release</span>' : ''}
          ${rel.draft ? '<span class="release-prerelease">draft</span>' : ''}
        </div>
      </div>
      <div style="display:flex;gap:0.4rem;align-items:center">
        <div id="release-result-${i}" class="result-summary" style="display:flex;gap:0.25rem"></div>
        ${prevTag ? `<button class="verify-btn" data-action="verify-release" data-base="${esc(prevTag)}" data-head="${esc(rel.tag_name)}" data-idx="${i}">検証</button>` : '<span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-secondary)">初回リリース</span>'}
      </div>
    </div>`;
  }).join('') + '</div>');
}

let _releaseAuditCache = {};
async function loadReleaseAuditResults() {
  try {
    const entries = await swrFetch(`/api/repos/${OWNER}/${REPO}/verify-release/latest`);
    _releaseAuditCache = {};
    for (const e of entries) {
      _releaseAuditCache[e.target_ref] = e;
    }
  } catch (_) {}
}

function applyReleaseAuditBadges() {
  for (let i = 0; i < allReleases.length; i++) {
    const rel = allReleases[i];
    const prevTag = i < allReleases.length - 1 ? allReleases[i + 1].tag_name : null;
    if (!prevTag) continue;
    const ref = `${prevTag}..${rel.tag_name}`;
    const cached = _releaseAuditCache[ref];
    if (!cached) continue;
    const el = document.getElementById(`release-result-${i}`);
    if (el && !el.innerHTML) {
      el.setHTML(compactBadges(cached.pass, cached.fail, cached.review));
    }
  }
}

async function loadReleases() {
  try {
    const releases = await swrFetch(`/api/repos/${OWNER}/${REPO}/releases`);
    renderReleaseList(releases);
    await loadReleaseAuditResults();
    applyReleaseAuditBadges();
  } catch (e) {
    renderLoadError('release-list', 'リリースの取得に失敗しました。', 'loadReleases');
  }
}

async function verifyRelease() {
  const baseTag = document.getElementById('base-tag').value;
  const headTag = document.getElementById('head-tag').value;
  if (!baseTag || !headTag) return;
  if (baseTag === headTag) { document.getElementById('result-area').setHTML('<div class="card" style="color:var(--accent-vermillion)">Base TagとHead Tagは異なる値を選択してください</div>'); return; }

  const policy = document.getElementById('release-policy').value;
  const btn = document.getElementById('verify-btn');
  const area = document.getElementById('result-area');

  btn.disabled = true;
  btn.textContent = '検証中…';
  btn.classList.add('running');
  area.setHTML('<div class="loading" role="status">検証を実行中</div>');

  try {
    const resp = await fetchWithTimeout(`/api/repos/${OWNER}/${REPO}/verify-release?base_tag=${encodeURIComponent(baseTag)}&head_tag=${encodeURIComponent(headTag)}&policy=${encodeURIComponent(policy)}`, { method: 'POST' }, 60000);
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    area.setHTML(renderFindingsTable(data.findings, `${esc(baseTag)} .. ${esc(headTag)} 検証結果`));
  } catch (e) {
    area.setHTML(renderErrorCard(e.message));
  }
  btn.disabled = false;
  btn.textContent = '検証を実行';
  btn.classList.remove('running');
}

async function verifyReleaseByTag(baseTag, headTag, idx, btn) {
  const policy = document.getElementById('release-policy').value;
  btn.disabled = true;
  btn.textContent = '検証中…';
  btn.classList.add('running');
  const resultEl = document.getElementById(`release-result-${idx}`);

  try {
    const resp = await fetch(`/api/repos/${OWNER}/${REPO}/verify-release?base_tag=${encodeURIComponent(baseTag)}&head_tag=${encodeURIComponent(headTag)}&policy=${encodeURIComponent(policy)}`, { method: 'POST' });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    const c = countFindings(data.findings);
    resultEl.setHTML(compactBadges(c.pass, c.fail, c.review));
    document.getElementById('result-area').setHTML(renderFindingsTable(data.findings, `${esc(baseTag)} .. ${esc(headTag)} 検証結果`));
    btn.textContent = '再検証';
  } catch (e) {
    resultEl.setHTML('<span class="badge badge-fail" title="ERROR">ERR</span>');
    btn.textContent = '再試行';
  }
  btn.disabled = false;
  btn.classList.remove('running');
}

// Event delegation
document.getElementById('verify-btn').addEventListener('click', verifyRelease);
document.getElementById('release-list').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action="verify-release"]');
  if (btn) {
    verifyReleaseByTag(btn.dataset.base, btn.dataset.head, Number(btn.dataset.idx), btn);
  }
});

loadReleases();

// SSE: バックグラウンド同期完了時にリリース一覧を再取得
const es = new EventSource('/api/events');
es.addEventListener('job', async (e) => {
  try {
    const ev = JSON.parse(e.data);
    if (ev.type === 'releases_synced' && ev.owner === OWNER && ev.repo === REPO) {
      delete _swrCache[`/api/repos/${OWNER}/${REPO}/releases`];
      loadReleases();
    }
  } catch (_) {}
});
</script>
{% endblock %}
