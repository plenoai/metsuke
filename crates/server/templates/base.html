<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{% endblock %} — Metsuke</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
{% block head %}{% endblock %}
</head>
<body>
<div class="shell">
  <a class="skip-link" href="#main">コンテンツへスキップ</a>
  <header class="header" role="banner">
    <div class="header-left">
      <div>
        <a class="brand" href="/repos" aria-label="Metsuke ホーム">目付</a>
        <div class="brand-sub">Metsuke</div>
      </div>
      <nav class="nav-links" aria-label="メインナビゲーション">
        <a class="nav-link{% if active_page == "repos" %} active{% endif %}" href="/repos">Repos</a>
        <a class="nav-link{% if active_page == "audit" %} active{% endif %}" href="/audit">Audit</a>
        <a class="nav-link{% if active_page == "settings" %} active{% endif %}" href="/settings">Settings</a>
      </nav>
    </div>
    <div class="user-badge">
      <strong>{{ login }}</strong>
      <a class="logout-link" href="/auth/logout">logout</a>
    </div>
  </header>
  <main id="main" role="main">
    {% block content %}{% endblock %}
  </main>
</div>
<script>
// SWR (Stale-While-Revalidate) fetch helper.
// Returns cached data immediately if fresh; otherwise fetches and caches.
// On fetch error, falls back to stale cache if available.
const _swrCache = {};
async function swrFetch(url, { maxAge = 60000 } = {}) {
  const entry = _swrCache[url];
  const now = Date.now();

  if (entry && now - entry.ts < maxAge) return entry.data;

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.statusText);
    const data = await resp.json();
    _swrCache[url] = { data, ts: now };
    return data;
  } catch (e) {
    if (entry) return entry.data;
    throw e;
  }
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
