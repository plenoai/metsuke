<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{% endblock %} — Metsuke</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://api.github.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" id="github-markdown-css" href="/static/vendor/github-markdown-dark.min.css">
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/themes.css">
<script src="/static/theme-init.js"></script>
{% block head %}{% endblock %}
</head>
<body>
<div class="shell">
  <a class="skip-link" href="#main">コンテンツへスキップ</a>
  <header class="header" role="banner">
    <div class="header__left">
      <div>
        <a class="header__brand" href="/repos" aria-label="Metsuke ホーム">目付</a>
        <div class="header__sub">Metsuke</div>
      </div>
      <nav class="nav__list" aria-label="メインナビゲーション">
        <a class="nav__item{% if active_page == "repos" %} is-active{% endif %}" href="/repos">リポジトリ</a>
        <a class="nav__item{% if active_page == "audit" %} is-active{% endif %}" href="/audit">監査ログ</a>
        <a class="nav__item{% if active_page == "settings" %} is-active{% endif %}" href="/settings">設定</a>
      </nav>
    </div>
    <div class="user-badge">
      <strong>{{ login }}</strong>
      <a class="user-badge__logout" href="/auth/logout">ログアウト</a>
    </div>
  </header>
  <main id="main" role="main">
    {% block content %}{% endblock %}
  </main>
</div>
<script src="/static/app.js"></script>
<script src="/static/verify-common.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
