<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{% endblock %} — Metsuke</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://api.github.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
{% block head %}{% endblock %}
</head>
<body>
<div class="shell">
  <a class="skip-link" href="#main">コンテンツへスキップ</a>
  <header class="header" role="banner">
    <div class="header-left">
      <div>
        <a class="brand" href="/repos" aria-label="Metsuke ホーム">目付</a>
        <div class="brand-sub">Metsuke</div>
      </div>
      <nav class="nav-links" aria-label="メインナビゲーション">
        <a class="nav-link{% if active_page == "repos" %} active{% endif %}" href="/repos">リポジトリ</a>
        <a class="nav-link{% if active_page == "audit" %} active{% endif %}" href="/audit">監査ログ</a>
        <a class="nav-link{% if active_page == "settings" %} active{% endif %}" href="/settings">設定</a>
      </nav>
    </div>
    <div class="user-badge">
      <strong>{{ login }}</strong>
      <a class="logout-link" href="/auth/logout">ログアウト</a>
    </div>
  </header>
  <main id="main" role="main">
    {% block content %}{% endblock %}
  </main>
</div>
<script>
// SWR (Stale-While-Revalidate) fetch helper.
// Returns cached data immediately if fresh; otherwise fetches and caches.
// On fetch error, falls back to stale cache if available.
const _swrCache = {};
async function swrFetch(url, { maxAge = 60000 } = {}) {
  const entry = _swrCache[url];
  const now = Date.now();

  if (entry && now - entry.ts < maxAge) return entry.data;

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.statusText);
    const data = await resp.json();
    _swrCache[url] = { data, ts: now };
    return data;
  } catch (e) {
    if (entry) return entry.data;
    throw e;
  }
}
</script>
<script src="/static/verify-common.js"></script>
<script>
// Global keyboard shortcuts (when not focused on input/select/textarea)
document.addEventListener('keydown', function(e) {
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  switch (e.key) {
    // Navigation: g then r/a/s (vim-style two-key nav via single-key for simplicity)
    case 'g':
      // Set up pending nav key
      document._metsukeNavPending = true;
      setTimeout(() => { document._metsukeNavPending = false; }, 800);
      return;
    case 'r':
      if (document._metsukeNavPending) { document._metsukeNavPending = false; window.location = '/repos'; e.preventDefault(); }
      return;
    case 'a':
      if (document._metsukeNavPending) { document._metsukeNavPending = false; window.location = '/audit'; e.preventDefault(); }
      return;
    case 's':
      if (document._metsukeNavPending) { document._metsukeNavPending = false; window.location = '/settings'; e.preventDefault(); }
      return;
    // Focus search: /
    case '/':
      e.preventDefault();
      const searchEl = document.getElementById('search-input') || document.getElementById('filter-repo');
      if (searchEl) { searchEl.focus(); searchEl.select(); }
      return;
    // Primary action: Enter (trigger verify on current page)
    // j/k: navigate repo cards or table rows
    case 'j':
    case 'k': {
      const cards = Array.from(document.querySelectorAll('.repo-card:not([style*="display: none"]):not([style*="display:none"]), .pr-item, .audit-table tbody tr'));
      if (cards.length === 0) return;
      e.preventDefault();
      const current = document.querySelector('.repo-card.kbd-focus, .pr-item.kbd-focus, .audit-table tbody tr.kbd-focus');
      let idx = current ? cards.indexOf(current) : -1;
      if (current) current.classList.remove('kbd-focus');
      idx = e.key === 'j' ? Math.min(idx + 1, cards.length - 1) : Math.max(idx - 1, 0);
      cards[idx].classList.add('kbd-focus');
      cards[idx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      return;
    }
    // Open focused item
    case 'o':
    case 'Enter': {
      const focused = document.querySelector('.kbd-focus');
      if (!focused) return;
      const link = focused.querySelector('a[href]');
      if (link) { e.preventDefault(); window.location = link.href; }
      return;
    }
    // Help overlay
    case '?':
      e.preventDefault();
      toggleShortcutHelp();
      return;
  }
});

function toggleShortcutHelp() {
  let overlay = document.getElementById('kbd-help-overlay');
  if (overlay) { overlay.remove(); return; }
  overlay = document.createElement('div');
  overlay.id = 'kbd-help-overlay';
  overlay.setAttribute('role', 'dialog');
  overlay.setAttribute('aria-label', 'キーボードショートカット');
  overlay.innerHTML = `
    <div class="kbd-help-backdrop"></div>
    <div class="kbd-help-panel" tabindex="-1" role="document">
      <div style="font-family:var(--font-mono);font-size:0.8rem;font-weight:700;margin-bottom:0.75rem;color:var(--accent-gold)">キーボードショートカット</div>
      <table style="font-family:var(--font-mono);font-size:0.72rem;color:var(--text-primary);border-collapse:collapse;width:100%">
        <tr><td class="kbd-key">g r</td><td>リポジトリ一覧</td></tr>
        <tr><td class="kbd-key">g a</td><td>監査ログ</td></tr>
        <tr><td class="kbd-key">g s</td><td>設定</td></tr>
        <tr><td class="kbd-key">/</td><td>検索にフォーカス</td></tr>
        <tr><td class="kbd-key">j / k</td><td>リスト上下移動</td></tr>
        <tr><td class="kbd-key">o</td><td>選択項目を開く</td></tr>
        <tr><td class="kbd-key">?</td><td>このヘルプを表示</td></tr>
      </table>
      <button class="verify-btn kbd-help-close" style="margin-top:0.75rem;font-size:0.6rem">閉じる (Esc)</button>
    </div>`;
  document.body.appendChild(overlay);
  // Save and restore focus on close
  const _prevFocus = document.activeElement;
  const panel = overlay.querySelector('.kbd-help-panel');
  function closeOverlay() {
    overlay.remove();
    if (_prevFocus) _prevFocus.focus();
  }
  overlay.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closeOverlay(); return; }
    // Focus trap: cycle focus within the dialog
    if (e.key === 'Tab') {
      const focusable = overlay.querySelectorAll('button, [tabindex="-1"]');
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault(); last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault(); first.focus();
      }
    }
  });
  overlay.querySelector('.kbd-help-backdrop').onclick = closeOverlay;
  overlay.querySelector('.kbd-help-close').onclick = closeOverlay;
  panel.focus();
}
// Stamp print date for @media print header
window.addEventListener('beforeprint', function() {
  var h = document.querySelector('.header');
  if (h) h.setAttribute('data-print-date', '出力日時: ' + new Date().toLocaleString('ja-JP'));
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
