<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 目付 (Metsuke) favicon — inspector's eye motif -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#g)" stroke="#e2c069" stroke-width="1"/>
  <!-- Eye shape — outer (almond) -->
  <path d="M5 16 Q16 6 27 16 Q16 26 5 16 Z" fill="none" stroke="#e2c069" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Iris -->
  <circle cx="16" cy="16" r="5" fill="#e2c069" opacity="0.9"/>
  <!-- Pupil -->
  <circle cx="16" cy="16" r="2.2" fill="#1a1a2e"/>
  <!-- Light reflection -->
  <circle cx="17.5" cy="14.5" r="1" fill="#fff" opacity="0.7"/>
</svg>
